<!DOCTYPE html>
<html>
<head>
    <title>Lego Store Registration Page</title>
</head>

<body>

<h2>Register</h2>

<form onsubmit="return registerUser()">

    First Name: <input type="text" id="firstName"><br><br>

    Last Name: <input type="text" id="lastName"><br><br>

    Username: <input type="text" id="username"><br><br>

    Email: <input type="email" id="email"><br><br>

    Password: <input type="password" id="password"><br><br>

    Date of Birth: <input type="date" id="dob"><br><br>

    <input type="submit" value="Register">

</form>

<p id="output"></p>

<script>
function registerUser() {

    let firstName = document.getElementById("firstName").value;
    let lastName = document.getElementById("lastName").value;
    let username = document.getElementById("username").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let dob = document.getElementById("dob").value;

    // check if any field is empty
    if (firstName == "" || lastName == "" || username == "" || email == "" || password == "" || dob == "") {
        document.getElementById("output").innerHTML = "Registration Failed: All fields are required.";
        return false;
    }

    // check password
    if (password.includes("!") == false && password.includes("?") == false) {
        document.getElementById("output").innerHTML = "Registration Failed: Password must contain ! or ?";
        return false;
    }

    // user object
    let user = {
        firstName: firstName,
        lastName: lastName,
        username: username,
        email: email,
        password: password,
        dob: dob
    };

    // mask password
    let hiddenPassword = "";
    for (let i = 0; i < user.password.length; i++) {
        hiddenPassword += "*";
    }

    // display result
    document.getElementById("output").innerHTML =
        "Registration Successful!<br>" +
        "Name: " + user.firstName + " " + user.lastName + "<br>" +
        "Username: " + user.username + "<br>" +
        "Email: " + user.email + "<br>" +
        "Password: " + hiddenPassword + "<br>" +
        "DOB: " + user.dob;

    return false;
}
</script>

</body>
</html>
